services:
  api:
    build: ./backend
    ports:
      - '4000:4000'
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=4000
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped
